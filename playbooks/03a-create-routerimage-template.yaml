---
- name: Build VyOS template on Proxmox
  hosts: proxmox-server
  become: yes

  vars:
    vmid: 9001
    template_name: vyos-template
    image_url: https://github.com/vyos/vyos-nightly-build/releases/download/2026.04.13-0034-rolling/vyos-2026.04.13-0034-rolling-generic-amd64.iso
    image_path: /var/lib/vz/template/iso/vyos.iso
    storage: local-lvm

  tasks:

    # ---------------------------
    # Download VyOS image
    # ---------------------------
    - name: Ensure ISO directory exists
      file:
        path: /var/lib/vz/template/iso
        state: directory

    - name: Download VyOS image (if not exists)
      get_url:
        url: "{{ image_url }}"
        dest: "{{ image_path }}"
        mode: '0644'
      register: download_result
      retries: 3
      delay: 5
      until: download_result is succeeded

    # ---------------------------
    # Check if VM exists
    # ---------------------------
    - name: Check if VM already exists
      command: qm status {{ vmid }}
      register: vm_status
      failed_when: false
      changed_when: false

    # ---------------------------
    # Create VM
    # ---------------------------
    - name: Create VM
      command: >
        qm create {{ vmid }}
        --name {{ template_name }}
        --memory 1024
        --cores 2
        --net0 virtio,bridge=vmbr0
      when: vm_status.rc != 0

    # ---------------------------
    # Attach disk
    # ---------------------------
    - name: Attach disk to VM
      command: qm set {{ vmid }} --scsi0 {{ storage }}:10

    # ---------------------------
    # Attach ISO
    # ---------------------------
    - name: Attach ISO
      command: qm set {{ vmid }} --cdrom local:iso/vyos.iso

    # ---------------------------
    # Configure boot
    # ---------------------------
    - name: Set boot order
      command: qm set {{ vmid }} --boot order=ide2

    - name: Enable serial console
      command: qm set {{ vmid }} --serial0 socket --vga serial0

    # ---------------------------
    # Start VM
    # ---------------------------
    - name: Start VM
      command: qm start {{ vmid }}