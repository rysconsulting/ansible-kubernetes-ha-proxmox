- name: Initialize first control plane
  hosts: k8s_control_plane[0]
  become: yes
  vars:
    kubeadm_init_args: >-
      --control-plane-endpoint "192.168.100.100:6443"
      --upload-certs
      --pod-network-cidr "{{ pod_network_cidr }}"
      --service-cidr "{{ service_cidr }}"
  tasks:
    - name: Wait for VIP to be reachable
      command: ping -c 1 192.168.100.100
      register: vip_ping
      retries: 10
      delay: 2
      until: vip_ping.rc == 0

    - name: Run kubeadm init
      command: "kubeadm init {{ kubeadm_init_args }}"
      register: init_output
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Wait for Kubernetes API via VIP
      command: nc -z 192.168.100.100 6443
      retries: 20
      delay: 5
      register: api_check
      until: api_check.rc == 0

    - name: Create .kube directory for root
      file:
        path: /root/.kube
        state: directory
        mode: '0755'

    - name: Copy admin.conf to root kubeconfig
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: yes
        owner: root
        group: root
        mode: '0600'

    - name: Generate worker join command
      command: kubeadm token create --print-join-command
      register: join_cmd_raw

    - name: Upload certs and get certificate key
      command: kubeadm init phase upload-certs --upload-certs
      register: cert_key_raw

    - name: Save join data as facts
      set_fact:
        worker_join_cmd: "{{ join_cmd_raw.stdout }}"
        certificate_key: "{{ cert_key_raw.stdout_lines[-1] }}"

    - name: Ensure join command exists
      fail:
        msg: "worker_join_cmd is empty — cp-1 step likely failed"
      when: hostvars[groups['k8s_control_plane'][0]].worker_join_cmd | length == 0

- name: Join additional control planes
  hosts: cp-2,cp-3
  become: yes
  tasks:
    - name: Ensure port 6443 is free
      shell: ss -ltnp | grep :6443
      register: port_check
      failed_when: port_check.rc == 0
      ignore_errors: false

    - name: Build control plane join command
      set_fact:
        control_plane_join_cmd: >-
          {{ hostvars[groups['k8s_control_plane'][0]].worker_join_cmd }}
          --control-plane
          --certificate-key {{ hostvars[groups['k8s_control_plane'][0]].certificate_key }}

    - name: Execute control plane join
      command: "{{ control_plane_join_cmd }}"
      args:
        creates: /etc/kubernetes/admin.conf

- name: Join worker nodes
  hosts: k8s_workers
  become: yes
  tasks:
    - name: Execute worker join
      command: "{{ hostvars[groups['k8s_control_plane'][0]].worker_join_cmd }}"
      args:
        creates: /etc/kubernetes/kubelet.conf

- name: Install Calico CNI
  hosts: cp-1
  become: yes
  vars:
    calico_version: "v3.26.4"
  tasks:
    - name: Install Calico operator
      command: >
        kubectl apply --server-side -f
        https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/tigera-operator.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Install Calico custom resources
      command: >
        kubectl apply --server-side -f
        https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/custom-resources.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf