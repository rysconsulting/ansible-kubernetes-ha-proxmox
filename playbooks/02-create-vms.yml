# 🔧 Configure all machines (except bastion)
- name: Configure VMs (disk + base setup)
  hosts: k8s_all
  become: yes
  gather_facts: no
#  vars:
#    ansible_user: ansible
#    ansible_ssh_private_key_file: "/Users/roysakai/Documents/DevOPS/MyProjects/Proxmox/proxmox_key"

  tasks:
  - name: Install required packages
    apt:
      name:
        - cloud-guest-utils
        - net-tools
        - curl
        - vim
      state: present
      update_cache: yes
    register: apt_result
    retries: 5
    delay: 10
    until: apt_result is success

  - name: Detect disk
    shell: lsblk -ndo NAME,TYPE | awk '$2=="disk"{print $1; exit}'
    register: disk_name

  - name: Expand partition
    command: "growpart /dev/{{ disk_name.stdout }} 1"
    register: growpart_result
    failed_when: false
    changed_when: "'CHANGED' in growpart_result.stdout"

  - name: Resize filesystem
    command: "resize2fs /dev/{{ disk_name.stdout }}1"
    become: yes
    register: resizefs_result
    failed_when: false