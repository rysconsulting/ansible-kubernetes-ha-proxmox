- name: Create VMs (k8s + bastion)
  hosts: proxmox-server
  gather_facts: no
  vars:
    template_vmid: 9000
    vms:
      # ---------------- Load Balancers ----------------
      - { name: lb-1, vmid: 100, bridge: vmbr1, ip: 192.168.100.21/24, gateway: 192.168.100.1, disk: 10G }
      - { name: lb-2, vmid: 107, bridge: vmbr1, ip: 192.168.100.22/24, gateway: 192.168.100.1, disk: 10G }
      # Control plane (vmbr1)
      - { name: cp-1, vmid: 101, bridge: vmbr1, ip: 192.168.100.11/24, gateway: 192.168.100.1, disk: 20G }
      - { name: cp-2, vmid: 102, bridge: vmbr1, ip: 192.168.100.12/24, gateway: 192.168.100.1, disk: 20G }
      - { name: cp-3, vmid: 103, bridge: vmbr1, ip: 192.168.100.13/24, gateway: 192.168.100.1, disk: 20G }

      # Workers A (vmbr2)
      - { name: worker-1, vmid: 104, bridge: vmbr2, ip: 192.168.120.11/24, gateway: 192.168.120.1, disk: 40G }
      - { name: worker-2, vmid: 105, bridge: vmbr2, ip: 192.168.120.12/24, gateway: 192.168.120.1, disk: 40G }

      # Workers B (vmbr3)
      - { name: worker-3, vmid: 106, bridge: vmbr3, ip: 192.168.130.11/24, gateway: 192.168.130.1, disk: 40G }
      # Bastion
      - { name: bastion-1, vmid: 110, bridge: vmbr0, ip: 192.168.220.200/24, gateway: 192.168.220.102, disk: 10G }

  tasks:

  - name: Clone VMs
    command: /usr/sbin/qm clone {{ template_vmid }} {{ item.vmid }} --name {{ item.name }} --full
    loop: "{{ vms }}"
    become: yes
    register: clone_result
    changed_when: clone_result.rc == 0
    failed_when: clone_result.rc != 0 and "already exists" not in clone_result.stderr

  - name: Resize disks
    command: /usr/sbin/qm resize {{ item.vmid }} scsi0 {{ item.disk }}
    loop: "{{ vms }}"
    become: yes

  - name: Configure networking + cloud-init
    command: >
      /usr/sbin/qm set {{ item.vmid }}
      --net0 "virtio,bridge={{ item.bridge }}"
      --ipconfig0 "ip={{ item.ip }},gw={{ item.gateway }}"
      --ciuser "ansible"
      --sshkeys /root/.ssh/authorized_keys
    loop: "{{ vms }}"
    become: yes

  - name: Check VM status
    command: /usr/sbin/qm status {{ item.vmid }}
    loop: "{{ vms }}"
    register: vm_status
    become: yes

  - name: Update cloud-init config (force update to apply new IPs)
    command: >
      /usr/sbin/qm cloudinit update {{ item.item.vmid }}
    loop: "{{ vm_status.results }}"
    become: yes

  - name: Start or reboot VMs
    command: >
      /usr/sbin/qm {{ 'reset' if 'running' in item.stdout else 'start' }} {{ item.item.vmid }}
    loop: "{{ vm_status.results }}"
    become: yes

# 🔧 Configure bastion

- name: Configure VMs (disk + base setup)
  hosts: bastion
  become: yes
  gather_facts: no
#  vars:
#    ansible_user: ansible
#    ansible_ssh_private_key_file: "/Users/roysakai/Documents/DevOPS/MyProjects/Proxmox/proxmox_key"

  tasks:
  - name: Wait for bastion to be ready
    wait_for:
      host: "{{ ansible_host }}"
      port: 22
      timeout: 300
    delegate_to: localhost
    become: no

  - name: Remove old SSH host key for bastion
    delegate_to: localhost
    become: no
    shell: ssh-keygen -R {{ ansible_host }} || true

  - name: Install required packages
    apt:
      name:
        - cloud-guest-utils
        - net-tools
        - curl
        - vim
      state: present
      update_cache: yes

  - name: Detect disk
    shell: lsblk -ndo NAME,TYPE | awk '$2=="disk"{print $1; exit}'
    register: disk_name

  - name: Expand partition
    command: "growpart /dev/{{ disk_name.stdout }} 1"
    become: yes
    register: growpart_result
    failed_when: false
    changed_when: "'CHANGED' in growpart_result.stdout"

  - name: Resize filesystem
    command: "resize2fs /dev/{{ disk_name.stdout }}1"
    become: yes
    register: resizefs_result
    failed_when: false

  - name: Enable IP forwarding (bastion only)
    sysctl:
      name: net.ipv4.ip_forward
      value: "1"

  - name: Add routes on bastion
    blockinfile:
      path: /etc/netplan/99-bastion.yaml
      create: yes
      block: |
        network:
          version: 2
          ethernets:
            eth0:
              routes:
                - to: 192.168.100.0/24
                  via: 192.168.220.102
                - to: 192.168.120.0/24
                  via: 192.168.220.102
                - to: 192.168.130.0/24
                  via: 192.168.220.102

  - name: Apply netplan (bastion)
    command: netplan apply

